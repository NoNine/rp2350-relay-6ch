# Relay GPIO, USB CDC ACM transport, and MCUmgr protocol configuration.
CONFIG_PRINTK=y
CONFIG_LOG=y
CONFIG_GPIO=y
CONFIG_PWM=y
CONFIG_LED_STRIP=y
CONFIG_RP2350_RELAY_6CH_DISPLAY=y
CONFIG_RP2350_RELAY_6CH_DISPLAY_ROTATED_180=y
CONFIG_RP2350_RELAY_6CH_BUZZER_FEEDBACK=y
CONFIG_SERIAL=y
CONFIG_UART_LINE_CTRL=y
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y
CONFIG_SHELL=y
CONFIG_KERNEL_SHELL=y
CONFIG_SHELL_BACKEND_SERIAL=y
CONFIG_ZCBOR=y
CONFIG_NET_BUF=y
CONFIG_MCUMGR=y
CONFIG_MCUMGR_SMP_CBOR_MAX_MAIN_MAP_ENTRIES=16
CONFIG_MCUMGR_GRP_ENUM=y
CONFIG_MCUMGR_GRP_ENUM_DETAILS=y
CONFIG_MCUMGR_GRP_ENUM_DETAILS_NAME=y
CONFIG_USB_DEVICE_STACK_NEXT=y
CONFIG_CDC_ACM_SERIAL_INITIALIZE_AT_BOOT=y
# Standard Raspberry Pi Pico SDK CDC UART VID/PID for CDC ACM-only firmware.
# Application identity is provided by USB manufacturer, product, and serial strings.
CONFIG_CDC_ACM_SERIAL_VID=0x2E8A
CONFIG_CDC_ACM_SERIAL_PID=0x0009
CONFIG_CDC_ACM_SERIAL_MANUFACTURER_STRING="Waveshare Electronics"
CONFIG_CDC_ACM_SERIAL_PRODUCT_STRING="RP2350-Relay-6CH SMP CDC"
CONFIG_HWINFO=y
CONFIG_HWINFO_RPI_PICO_CHIP_ID=y
CONFIG_REBOOT=y
CONFIG_UART_MCUMGR=y
CONFIG_MCUMGR_TRANSPORT_UART=y
CONFIG_BASE64=y
CONFIG_CRC=y
